# ================================
# PIPELINE TEMPLATE — Application Laravel
# ================================
# Extends pipeline-php-package.yml for Laravel applications (not packages).
# Overrides the php:test job (migrate + seed) and disables publish/release.
#
# USAGE:
# ─────────────
#   include:
#     - project: 'zairakai/php-packages/laravel-dev-tools'
#       ref: main
#       file: '.gitlab/ci/pipeline-laravel-app.yml'
#
#   variables:
#     CACHE_KEY: "my-app"
#     APP_ENV: "testing"
# ================================

include:
  - project: "zairakai/php-packages/laravel-dev-tools"
    ref: main
    file: ".gitlab/ci/pipeline-php-package.yml"

# ================================
# STAGES — deploy added, publish/release removed
# ================================
stages:
  - security
  - install
  - validate
  - quality
  - test
  - deploy
  - metrics

# ================================
# LARAVEL VARIABLES
# ================================
variables:
  APP_ENV: "testing"
  APP_DEBUG: "false"
  DB_CONNECTION: "sqlite"
  DB_DATABASE: ":memory:"
  CACHE_DRIVER: "array"
  QUEUE_CONNECTION: "sync"
  SESSION_DRIVER: "array"

# ================================
# TEST — Overrides with migrate + seed
# ================================
php:test:
  before_script:
    - mkdir -p build/logs build/coverage
    - cp .env.testing .env 2>/dev/null || cp .env.example .env
    - php artisan key:generate --force
    - php artisan migrate:fresh --seed --env=testing --force
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - git config --global --add safe.directory '*'

# ================================
# PUBLISH — Disabled for apps
# ================================
php:publish:
  rules:
    - when: never

php:release:
  rules:
    - when: never

# ================================
# DEPLOY — Commented examples, adapt to your setup
# ================================

