# ================================
# LARAVEL-DEV-TOOLS — Pipeline CI/CD
# ================================
# Self-hosted pipeline: uses local templates (local:)
# because this project IS the source of the templates.
#
# Consumer projects use include:project instead.
# See .gitlab/ci/pipeline-php-package.yml for full documentation.

include:
  - local: '.gitlab/ci/pipeline-php-package.yml'

variables:
  # Unique Composer cache key for this project
  # Bumped to -v2: the runner's local cache volume held a corrupted
  # phpunit/phpunit install (orphaned DefaultJobRunner.php from an old
  # version, incompatible with 12.5.30's final JobRunner), surviving
  # every GitLab "clear runner cache" action since it is local-disk
  # cache, not shared object storage. New key = new local path.
  CACHE_KEY: "laravel-dev-tool-v2"

  # Nom du package sur Packagist
  PACKAGIST_PACKAGE: "zairakai/laravel-dev-tools"

  # Self-hosted mode: scripts live in this repo, not in vendor/
  DEV_TOOLS_SCRIPTS: "scripts"
  DEV_TOOLS_GITLAB_SCRIPTS: ".gitlab/scripts"
